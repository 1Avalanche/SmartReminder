name: AI Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  request-review:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger AI Review
        run: |
          curl -X POST "http://${{ secrets.VPS_IP }}/api/message" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.AGENT_API_KEY }}" \
            -d '{
              "text": "/review ${{ github.repository }} ${{ github.event.pull_request.number }}"
            }'
