name: Update Changelog by merge

on:
  pull_request:
    types:
      - closed

jobs:
  changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Trigger AI changelog update
        run: |
          curl -X POST "http://${{ secrets.VPS_IP }}:8084/api/message" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.AGENT_API_KEY }}" \
            -d '{
              "text": "/push ${{ github.repository }} ${{ github.ref_name }} ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} ${{ github.event.pull_request.number }}"
            }'
