name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Windows icon
        shell: pwsh
        run: |
          $src = "smartagent\investigator\investigator_logo.png"
          $dst = "smartagent\investigator\Investigator.ico"
          magick convert $src `
            -define icon:auto-resize=256,128,64,48,32,16 `
            $dst
          Write-Host "Icon created: $dst"

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($wix) {
            "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX found: $($wix.FullName)"
          } else { Write-Error "WiX not found" }

      - name: Create .properties from secrets
        shell: pwsh
        run: |
          @(
            "GITHUB_CORP_TOKEN=${{ secrets.INVESTIGATOR_GITHUB_CORP_TOKEN }}",
            "GITHUB_CORP_HOST=${{ secrets.INVESTIGATOR_GITHUB_CORP_HOST }}",
            "INVASTIGATOR_OWNERR=${{ secrets.INVESTIGATOR_OWNER }}",
            "UI_REPO=${{ secrets.INVESTIGATOR_UI_REPO }}",
            "GPU_STACK_API_KEY=${{ secrets.INVESTIGATOR_GPU_STACK_API_KEY }}",
            "GPU_STACK_URL=${{ secrets.INVESTIGATOR_GPU_STACK_URL }}"
          ) | Set-Content -Path "smartagent\investigator\.properties" -Encoding utf8

      - name: Build Windows installer
        working-directory: smartagent
        run: ./gradlew :investigator:jpackageWindows
        shell: bash

      - name: List dist directory
        shell: pwsh
        run: |
          Write-Host "=== dist ==="
          Get-ChildItem -Recurse smartagent\investigator\build\dist -ErrorAction SilentlyContinue |
            Select-Object FullName

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: Investigator-Windows-${{ github.ref_name }}
          path: smartagent/investigator/build/dist/Investigator-*.exe
          if-no-files-found: error
